name: Validate & Deploy Dashboard

on:
  push:
    paths:
      - 'data/projects.json'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate projects.json
        run: |
          echo "Validating projects.json..."
          python3 -c "
          import json, sys
          with open('data/projects.json', 'r') as f:
              data = json.load(f)
          required = ['name', 'stage', 'progress', 'urgentTasks', 'milestones', 'opl', 'quotation']
          ok = True
          for pid, proj in data.items():
              missing = [k for k in required if k not in proj]
              if missing:
                  print(f'FAIL Project {pid}: missing fields: {missing}')
                  ok = False
          if not ok:
              sys.exit(1)
          print(f'OK: {len(data)} projects validated.')
          "

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
